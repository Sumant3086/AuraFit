<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Critical: prevent FOUC -->
    <script>
      try {
        const t = localStorage.getItem('aurafit_theme');
        if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
      } catch(e) {}
    </script>

    <!-- Primary SEO -->
    <title>AuraFit — Train Smarter. Live Stronger.</title>
    <meta name="description" content="AuraFit is the AI-powered fitness platform for serious athletes and everyday warriors. Personalized workouts, smart nutrition, QR check-ins, trainer bookings, and gamified progress — in one app." />
    <meta name="keywords" content="AI fitness platform, personalized workout plans, gym app India, trainer booking, fitness tracking, gamified fitness, smart nutrition" />
    <meta name="author" content="AuraFit" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://aurafitgymwebsite.onrender.com/" />

    <!-- Performance: DNS prefetch -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://api.razorpay.com" />
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />
    <link rel="dns-prefetch" href="https://generativelanguage.googleapis.com" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://aurafitgymwebsite.onrender.com/" />
    <meta property="og:title" content="AuraFit — Train Smarter. Live Stronger." />
    <meta property="og:description" content="The AI-powered fitness platform that builds workouts, tracks progress, and keeps you accountable — with 5,000+ members and counting." />
    <meta property="og:image" content="https://aurafitgymwebsite.onrender.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="AuraFit" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@AuraFitApp" />
    <meta name="twitter:title" content="AuraFit — Train Smarter. Live Stronger." />
    <meta name="twitter:description" content="AI-powered fitness: personalized workouts, smart nutrition, gamified progress. Join 5,000+ members." />
    <meta name="twitter:image" content="https://aurafitgymwebsite.onrender.com/og-image.png" />

    <!-- PWA -->
    <meta name="theme-color" content="#9d00ff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AuraFit" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Favicon — SVG first (scales perfectly), PNG fallback -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />

    <!-- Performance: preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Accessibility: color-scheme -->
    <meta name="color-scheme" content="dark light" />

    <!-- Razorpay SDK -->
    <script src="https://checkout.razorpay.com/v1/checkout.js" defer></script>

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "AuraFit",
      "applicationCategory": "HealthApplication",
      "description": "AI-powered gym management and fitness tracking platform",
      "url": "https://aurafitgymwebsite.onrender.com",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "INR"
      },
      "operatingSystem": "Web, iOS, Android"
    }
    </script>
  </head>
  <body>
    <noscript>
      <div style="text-align:center;padding:60px 40px;background:#0a0a0a;color:#fff;font-family:sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;">
        <h1 style="color:#9d00ff;font-size:32px;margin-bottom:16px;">AuraFit</h1>
        <p style="color:#ccc;font-size:18px;max-width:400px;line-height:1.6;">AI-Powered Fitness Platform</p>
        <p style="color:#666;font-size:14px;margin-top:16px;">Please enable JavaScript to use AuraFit.</p>
      </div>
    </noscript>
    <div id="root" role="main" aria-label="AuraFit Application"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
